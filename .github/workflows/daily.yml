name: Daily Substack Draft

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  generate-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Markdown draft
        run: python main.py --mock

      - name: Upload draft artifact
        uses: actions/upload-artifact@v4
        with:
          name: substack-draft
          path: |
            drafts/*.md
            drafts_cn/*.md
          if-no-files-found: error
